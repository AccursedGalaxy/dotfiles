# ==============================================================================
# USER CONFIGURATION: keybinds.conf
# ==============================================================================
# Add your custom settings for keybinds here.
# These will override or add to the defaults found in ~/.config/hypr/source/keybinds.conf
# This file can also be edited with dusky keybinds manager from the rofi menu or from dusky control center
# ==============================================================================

# Auto-generated by FM Switcher
bindd = $mainMod, E, File Manager, exec, uwsm-app $fileManager

# Auto-generated by Browser Switcher
bindd = $mainMod, W, Launch Browser, exec, uwsm-app -- $browser



# -- TERMINAL-CLIPBOARD-START --
unbind = $mainMod, V
bindd = $mainMod, V, Clipboard History, exec, $scripts/clipboard/close_terminal_clipboard.sh uwsm-app -- kitty --class terminal_clipboard.sh -e "$scripts/clipboard/terminal_clipboard.sh"
# -- TERMINAL-CLIPBOARD-END --

# [2026-03-22 18:22] SRC
unbind = CTRL, SPACE
bindd = CTRL SHIFT, W, Rofi Wallpaper Selector, exec, uwsm-app -- pkill rofi; ~/user_scripts/rofi/rofi_wallpaper_selctor.sh

# [2026-03-22 18:31] SRC
unbind = ALT, SPACE
unbind = $mainMod, A
bindd = $mainMod, A, Launch Menu for Apps, exec, pkill rofi; rofi -show drun -run-command "uwsm app -- {cmd}"


# [2026-03-22 18:32] UNBIND
unbind = $mainMod SHIFT, F


# [2026-03-22 18:34] SRC
unbind = $mainMod, C
bindd = $mainMod, Q, Close Window, killactive,


# [2026-03-22 18:36] CUST
bindd = $mainMod, return, Launch Terminal, exec, uwsm-app -- $terminal

# [2026-03-22 19:59] UNBIND
unbind = ALT SHIFT, SPACE

# [2026-03-22 19:59] UNBIND
unbind = ALT SHIFT, 5

# [2026-03-22 19:59] UNBIND
unbind = ALT SHIFT, TAB

# [2026-03-22 20:00] UNBIND
unbind = ALT, 0

# [2026-03-22 20:00] UNBIND
unbind = ALT, 1

# [2026-03-22 20:00] UNBIND
unbind = ALT, 4

# [2026-03-22 20:01] UNBIND
unbind = ALT, 5

# [2026-03-22 20:03] SRC
unbind = CTRL SHIFT, SPACE
unbind = $mainMod, K
bindd = $mainMod, K, Show Keybinds, exec, uwsm-app -- pkill rofi; ~/user_scripts/rofi/keybindings.sh


# [2026-03-22 20:05] UNBIND
unbind = $mainMod SHIFT, A

# [2026-03-22 20:06] UNBIND
unbind = $mainMod, I

# [2026-03-22 20:35] CUST
unbind = $mainMod, D
bindd = $mainMod, D, Toggle Float, exec, if hyprctl -j activewindow | jq -e '.floating | not'; then hyprctl --batch "dispatch togglefloating; dispatch resizeactive exact 90% 90%; dispatch centerwindow"; else hyprctl dispatch togglefloating; fi

# [2026-03-22 20:36] UNBIND
unbind = $mainMod, F

# [2026-03-22 20:47] SRC
unbind = $mainMod, apostrophe
bindd = $mainMod SHIFT, W, Cycle Next Wallpaper, exec, uwsm-app -- ~/user_scripts/theme_matugen/theme_ctl.sh next
