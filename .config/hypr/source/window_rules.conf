    name = showmethekey-floating
    match:class = ^(showmethekey-gtk)$
    match:title = ^(Floating Window - Show Me The Key)$
    float = on
    pin = on
    size = 470 50
    move = ((monitor_w-window_w)/2) (monitor_h-window_h-20)
    # Critical: Don't let it steal focus (so you can keep typing)
#  no_focus = on
    no_dim = on
    border_size = 0
    opaque = on
}

