# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

# MONITOR CONFIG - Force 8-bit color depth for Discord screen sharing compatibility
monitor=DP-3,3440x1440@165,0x0,1,bitdepth,8,vrr,0
# HDMI 4K monitor to the right of DP-3
monitor=HDMI-A-1,3840x2160@60,3440x0,1,bitdepth,8,vrr,0
misc {
    vfr = true          # Variable frame rate: Reduces idle GPU wake-ups, smoothing AFK drops.
    vrr = 0             # Global VRR off (backs up per-monitor).
    force_default_wallpaper = 0  # Optional: Skips wallpaper redraws on idle, minor perf gain.
    disable_hyprland_logo = true # Cleans up startup, irrelevant but tidy.
    mouse_move_enables_dpms = 1
}
