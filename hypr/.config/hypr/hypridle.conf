# Variables (simplified suspend_cmd)
$lock_cmd = pidof hyprlock || hyprlock
$suspend_cmd = loginctl suspend  # Preferred over systemctl; covers most cases

general {
    lock_cmd = $lock_cmd
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on  # Generic wake; avoids Quickshell crash risk
    inhibit_sleep = 3  # Keep: Waits for hyprlock to secure session
    ignore_dbus_inhibit = true  # Ignores D-Bus "Video Wake Lock" spam from Lunar/Steam/etc.
}

# Gentle dim for short idle (Non-intrusive for early AFK)
listener {
    timeout = 120  # 2 mins
    on-timeout = brightnessctl set 30%  # Dim screen subtly; adjust % or use -s for set.
    on-resume = brightnessctl -r  # Restore brightness
    ignore_inhibit = false  # Respects game inhibitors here
}

listener {
    timeout = 300  # 5 mins: Keep lock
    on-timeout = loginctl lock-session
    ignore_inhibit = false  # Respects idle inhibitor
}

listener {
    timeout = 600  # 10 mins: Keep blank
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    ignore_inhibit = false  # Respects idle inhibitor
}

listener {
    timeout = 7200  # 2 hours: Extended to survive longer AFK/server kicks
    on-timeout = $suspend_cmd
    ignore_inhibit = false  # Respects idle inhibitor
}
